name: Build Windows EXE

on:
  push:
    tags:
      - "v*"          # v1.0, v1.2.1 같은 태그를 push하면 자동 빌드
  workflow_dispatch:  # GitHub 웹에서 수동으로도 실행 가능

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: EXE 빌드
        run: >
          pyinstaller
          --onefile
          --windowed
          --name GymOps
          --icon assets/아이콘.ico
          --add-data "assets;assets"
          run.py

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: GymOps-windows
          path: dist/GymOps.exe
          retention-days: 30
