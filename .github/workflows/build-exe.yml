name: Build Windows EXE

on:
  push:
    tags:
      - "v*"          # v1.0, v1.2.1 같은 태그를 push하면 자동 빌드
  workflow_dispatch:  # GitHub 웹에서 수동으로도 실행 가능

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: EdgeDriver 번들 다운로드
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path drivers | Out-Null

          # PATH에 msedgedriver가 있으면 그대로 사용 (runner 기본 설치)
          $fromPath = Get-Command msedgedriver.exe -ErrorAction SilentlyContinue
          if ($fromPath) {
            Write-Host "Found EdgeDriver in PATH: $($fromPath.Source)"
            Copy-Item $fromPath.Source drivers/msedgedriver.exe
          } else {
            # Edge 버전 감지 후 직접 다운로드
            $edgePath = @(
              "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe",
              "C:\Program Files\Microsoft\Edge\Application\msedge.exe"
            ) | Where-Object { Test-Path $_ } | Select-Object -First 1

            if (-not $edgePath) { throw "Microsoft Edge를 찾을 수 없습니다." }
            $edgeVersion = (Get-Item $edgePath).VersionInfo.ProductVersion
            Write-Host "Edge version: $edgeVersion"

            $driverUrl = "https://msedgedriver.azureedge.net/$edgeVersion/edgedriver_win64.zip"
            Write-Host "Downloading: $driverUrl"
            Invoke-WebRequest -Uri $driverUrl -OutFile edgedriver.zip -UseBasicParsing
            Expand-Archive -Path edgedriver.zip -DestinationPath drivers_tmp/ -Force

            # ZIP 내부 폴더 구조 무관하게 탐색
            $driverExe = Get-ChildItem -Path drivers_tmp/ -Recurse -Filter "msedgedriver.exe" | Select-Object -First 1
            if (-not $driverExe) { throw "msedgedriver.exe를 압축 파일에서 찾을 수 없습니다." }
            Copy-Item $driverExe.FullName drivers/msedgedriver.exe
          }

          Write-Host "EdgeDriver ready: $((Get-Item drivers/msedgedriver.exe).Length) bytes"

      - name: EXE 빌드
        run: >
          pyinstaller
          --onefile
          --windowed
          --name GymOps
          --icon assets/아이콘.ico
          --add-data "assets;assets"
          --add-data "drivers/msedgedriver.exe;drivers"
          --collect-all holidays
          --hidden-import holidays.countries.KR
          --collect-all selenium
          run.py

      - name: 빌드 결과물 업로드 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: GymOps-windows
          path: dist/GymOps.exe
          retention-days: 30

      - name: GitHub Release 생성 (태그 푸시 시)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: "true"
          files: dist/GymOps.exe

      - name: GitHub Release 업데이트 (수동 빌드 시)
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 최신 빌드 (latest)
          prerelease: true
          force_create_tag: true
          files: dist/GymOps.exe
